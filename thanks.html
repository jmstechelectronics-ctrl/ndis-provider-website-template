<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Thank You | Harbour Lane Support</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%232f766e'/%3E%3Ccircle cx='24' cy='22' r='8' fill='white'/%3E%3Cpath d='M22 41c8-7 15-6 21-15' stroke='white' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-width: 320px;
      font-family: "Plus Jakarta Sans", sans-serif;
      color: #342621;
      background: linear-gradient(180deg, #fffaf6 0%, #f4ece5 100%);
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      padding: 32px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(104, 82, 70, 0.1);
      box-shadow: 0 24px 54px rgba(78, 57, 46, 0.12);
    }

    h1 {
      margin: 0 0 16px;
      font-family: "Fraunces", serif;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      letter-spacing: -0.04em;
      line-height: 1.02;
    }

    p {
      margin: 0 0 14px;
      color: #65554c;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 20px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 800;
      text-decoration: none;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #2f766e, #1f5752);
    }

    .btn-secondary {
      color: #1f5752;
      background: #fff;
      border-color: rgba(47, 118, 110, 0.2);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card">
      <h1>Thanks for getting in touch.</h1>
      <p>Your enquiry has been sent. A team member will usually respond within 1 business day.</p>
      <p>If your question is urgent, call <a href="tel:0400555123">0400 555 123</a> or email <a href="mailto:hello@harbourlanesupport.com.au">hello@harbourlanesupport.com.au</a>.</p>
      <div class="actions">
        <a class="btn btn-primary" href="index.html">Back to homepage</a>
        <a class="btn btn-secondary" href="tel:0400555123">Call now</a>
      </div>
    </main>
  </div>
</body>
</html>
